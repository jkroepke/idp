ingress:
  enabled: false
  className: "nginx"
  hosts:
    - host: localhost
      paths:
        - path: /dex/
          pathType: Prefix

config:
  issuer: http://dex-proxy.dex.svc.cluster.local:8080/dex
  enablePasswordDB: true
  storage:
    type: kubernetes
    config:
      inCluster: true
  oauth2:
    responseTypes: [ "code" ]
    skipApprovalScreen: true
    alwaysShowLoginScreen: false
  staticClients:
    - id: argocd
      name: 'Argo CD'
      secret: argocd
      redirectURIs:
        - 'http://localhost/argo-cd/auth/callback'
        - 'http://localhost:8400/argo-cd/auth/callback'
    - id: forgejo
      name: 'forgejo'
      secret: forgejo
      redirectURIs:
        - 'http://localhost/git/user/oauth2/sso/callback'
        - 'http://localhost:8400/git/user/oauth2/sso/callback'
  staticPasswords:
    - email: "demo@example.com"
      # bcrypt hash of the string "password": $(echo password | htpasswd -BinC 10 admin | cut -d: -f2)
      hash: "$2y$10$izc7FQJuZ6vyYjYWe37tR.HkaLmBQUNPfq/.vAgfVsTXFicfdza/2"
      username: "demo"
      userID: "08a8684b-db88-4b73-90a9-3cd1661f5466"
