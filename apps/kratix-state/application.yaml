apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kratix-state
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: http://forgejo-http.forgejo.svc.cluster.local:3000/demo/state
      targetRevision: main
      path: management-cluster/
      directory:
        recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: kratix-worker-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - Validate=true
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - RespectIgnoreDifferences=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  revisionHistoryLimit: 10
