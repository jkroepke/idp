createAggregateRoles: true
crds:
  install: true

global:
  domain: localhost

configs:
  cm:
    create: true
    annotations: {}
    # -- Enable control of the service account used for the sync operation (alpha)
    ## Ref: https://argo-cd.readthedocs.io/en/stable/operator-manual/app-sync-using-impersonation/
    application.sync.impersonation.enabled: false
    # -- Enable logs RBAC enforcement
    ## Ref: https://argo-cd.readthedocs.io/en/latest/operator-manual/upgrading/2.3-2.4/#enable-logs-rbac-enforcement
    server.rbac.log.enforce.enable: false
    # -- Enable exec feature in Argo UI
    ## Ref: https://argo-cd.readthedocs.io/en/latest/operator-manual/rbac/#exec-resource
    exec.enabled: true
    # -- Enable local admin user
    ## Ref: https://argo-cd.readthedocs.io/en/latest/faq/#how-to-disable-admin-user
    admin.enabled: false
    # OIDC configuration as an alternative to dex (optional).
    # Dex configuration
    url: http://localhost/argo-cd
    dex.config: |
      connectors:
        - type: oidc
          id: sso
          name: SSO
          config:
            issuer: http://dex.dex.svc.cluster.local:5556/dex
            clientID: argocd
            clientSecret: argocd
            # redirectURI: http://127.0.0.1:5556/callback
            insecureSkipEmailVerified: true 
            getUserInfo: false
            providerDiscoveryOverrides:
              authURL: http://localhost/dex/auth
  rbac:
    create: true
    # -- The name of the default role which Argo CD will falls back to, when authorizing API requests (optional).
    # If omitted or empty, users may be still be able to login, but will see no apps, projects, etc...
    policy.default: 'role:unauthenticated'

    # -- File containing user-defined policies and role definitions.
    # @default -- `''` (See [values.yaml])
    policy.csv: |-
      g, demo@example.com, role:admin
dex:
  enabled: true

server:
  extraArgs:
    - --insecure
    - --rootpath=/argo-cd
  ingress:
    enabled: true
    ingressClassName: "nginx"
    paths:
      - "/argo-cd/"
    pathType: Prefix
    tls: false
