apiVersion: pkg.crossplane.io/v1
kind: Provider
metadata:
  name: crossplane-contrib-provider-aws-s3
spec:
  package: xpkg.crossplane.io/crossplane-contrib/provider-aws-s3:v2.0.0
  runtimeConfigRef:
    name: default-poll-interval
---
apiVersion: pkg.crossplane.io/v1
kind: Provider
metadata:
  name: crossplane-contrib-provider-aws-ec2
spec:
  package: xpkg.crossplane.io/crossplane-contrib/provider-aws-ec2:v2.0.0
  runtimeConfigRef:
    name: default-poll-interval
---
apiVersion: pkg.crossplane.io/v1
kind: Provider
metadata:
  name: crossplane-contrib-provider-aws-vpc
spec:
  package: xpkg.crossplane.io/crossplane-contrib/provider-aws-vpc:v2.0.0
  runtimeConfigRef:
    name: default-poll-interval
---
apiVersion: pkg.crossplane.io/vlbetal
kind: DeploymentRuntimeConfig
metadata:
  name: default-poll-interval
spec:
  deploymentTemplate:
    spec:
      selector: {}
      template:
        spec:
          containers:
            - name: package-runtime 
              args:
              - --poll-interval=1m
