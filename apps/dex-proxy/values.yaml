apiVersion: apps/v1
kind: Deployment
metadata:
  name: dex-proxy
spec:
  selector:
    matchLabels:
      app: dex-proxy
  template:
    metadata:
      labels:
        app: dex-proxy
    spec:
      containers:
        - name: nginx
          image: nginxinc/nginx-unprivileged:1.29.1-alpine
          ports:
            - containerPort: 8080
              name: http
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/
              readOnly: true
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /healthz
              port: telemetry
              scheme: HTTP
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 1
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /healthz
              port: telemetry
              scheme: HTTP
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 1
      volumes:
        - name: nginx-config
          configMap:
            name: dex-proxy-nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: dex-proxy
spec:
  type: ClusterIP
  selector:
    app: dex-proxy
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: dex-proxy-nginx-config
data:
  default.conf: |
    server {
      listen       8080;
      server_name  _;
    
      location = /healthz {
        access_log off;
        return 200 'OK';
        add_header Content-Type text/plain;
      }
    
      location /dex/ {
        proxy_pass         http://dex.dex.svc.cluster.local:5556;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Ssl on; # Optional
        proxy_set_header   X-Frame-Options SAMEORIGIN; # Optional
        proxy_redirect     off;
      }
    }
