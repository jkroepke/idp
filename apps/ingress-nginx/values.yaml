controller:
  allowSnippetAnnotations: true
  enableAnnotationValidations: true
  hostPort:
    enabled: true
    ports:
      http: 80
  service:
    type: ClusterIP
  admissionWebhooks:
    failurePolicy: Ignore
    patch:
      enabled: false
    certManager:
      enabled: true
  updateStrategy:
    type: Recreate
