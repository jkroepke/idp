kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: idp
networking:
  apiServerAddress: "127.0.0.1"
  apiServerPort: 6443
  podSubnet: "10.244.0.0/16"
  serviceSubnet: "10.96.0.0/12"
nodes:
  - role: control-plane
    extraMounts:
      - hostPath: ./certs/sa.key
        containerPath: /etc/kubernetes/pki/sa.key
      - hostPath: ./certs/sa.pub
        containerPath: /etc/kubernetes/pki/sa.pub
    kubeadmConfigPatches:
      - |
          kind: ClusterConfiguration
          apiServer:
            extraArgs:
              "service-account-issuer": "https://stopsstacklocal.blob.core.windows.net/oidc"
    extraPortMappings:
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP
      - containerPort: 2222
        hostPort: 2222
        protocol: TCP
