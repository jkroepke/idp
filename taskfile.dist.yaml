version: '3'
tasks:
  certs:
    desc: "Generate self-signed SSL certificates"
    dir: ./cluster/certs/
    silent: true
    generates:
      - sa.key
      - sa.pub
    status:
      - test -f sa.key
      - test -f sa.pub
    preconditions:
      - sh: command -v openssl >/dev/null
        msg: "OpenSSL is not installed. Please install it to proceed."
    cmds:
      - openssl genpkey -algorithm RSA -out sa.key -pkeyopt rsa_keygen_bits:4096
      - openssl rsa -in sa.key -pubout -out sa.pub
  cluster:
    desc: "Set up a local Kubernetes cluster using kind"
    deps: [certs]
    dir: ./cluster/
    status:
      - kind get clusters | grep -qe '^idp$'
    preconditions:
      - sh: command -v kind >/dev/null
        msg: "kind is not installed. Please install it to proceed."
    cmds:
      - kind create cluster --config config.yaml
  argocd:install:
    desc: "Install Argo CD in the cluster"
    deps: [cluster]
    status:
      - helm --kube-context kind-idp status argocd -n argocd
    preconditions:
      - sh: command -v kubectl >/dev/null
        msg: "kubectl is not installed. Please install it to proceed."
      - sh: command -v helm >/dev/null
        msg: "Helm is not installed. Please install it to proceed."
    cmds:
      - helm --kube-context kind-idp upgrade argocd argo-cd --wait --version 8.5.0 --install --repo https://argoproj.github.io/argo-helm --create-namespace --namespace argocd -f ./apps/argocd/values.yaml --hide-notes
  argocd:bootstrap:
    desc: "Bootstrap Argo CD with the initial application"
    deps: [argocd:install]
    dir: ./apps/
    status:
      - kubectl --context kind-idp get app bootstrap -n argocd >/dev/null 2>&1
    cmds:
      - kubectl --context kind-idp apply -f application.yaml -n argocd
  default:
    desc: "Set up the complete local Kubernetes cluster with Argo CD"
    deps: [argocd:bootstrap]
    silent: true
    cmds:
      - echo "Local Kubernetes cluster 'idp' with Argo CD has been set up successfully."
      - >-
        kubectl wait --namespace argocd --for=condition=ready pod --selector=app.kubernetes.io/name=argocd-application-controller --timeout=90s
      - >-
        echo "Access the Argo CD UI at: http://localhost:4800/argo-cd/"
      - >-
        echo "Login with username: demo@example.com, password: ThisIsInsecure!"
  cleanup:
    desc: "Delete the local Kubernetes cluster"
    cmds:
      - kind delete cluster --name idp
      - echo "Local Kubernetes cluster 'idp' has been deleted."
  aws:credentials:
    desc: "Create AWS credentials secret in the cluster"
    dir: ./apps/crossplane/
    status:
      - kubectl --context kind-idp get secret aws-secret -n crossplane-system >/dev/null 2>&1
    preconditions:
      - sh: command -v kubectl >/dev/null
        msg: "kubectl is not installed. Please install it to proceed."
      - sh: '[ -n "$AWS_ACCESS_KEY_ID" ]'
        msg: "AWS_ACCESS_KEY_ID environment variable is not set."
      - sh: '[ -n "$AWS_SECRET_ACCESS_KEY" ]'
        msg: "AWS_SECRET_ACCESS_KEY environment variable is not set."
    cmds:
      - >
        kubectl --context kind-idp create secret generic aws-secret --namespace crossplane-system --from-literal=creds="[default]
        aws_access_key_id=$AWS_ACCESS_KEY_ID
        aws_secret_access_key=$AWS_SECRET_ACCESS_KEY"
