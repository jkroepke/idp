apiVersion: platform.kratix.io/v1alpha1
kind: Promise
metadata:
  creationTimestamp: null
  name: s3
  namespace: default
spec:
  api:
    apiVersion: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    metadata:
      name: s3s.kratix.jkroepke.de
    spec:
      group: kratix.jkroepke.de
      names:
        kind: s3
        plural: s3s
        singular: s3
      scope: Namespaced
      versions:
      - name: v1
        schema:
          openAPIV3Schema:
            properties:
              spec:
                properties:
                  providerConfigRef:
                    properties:
                      kind:
                        type: string
                      name:
                        type: string
                    required:
                    - kind
                    - name
                    type: object
                required:
                - providerConfigRef
                type: object
            type: object
        served: true
        storage: true
        subresources:
          status: {}
  destinationSelectors:
  - matchLabels:
      environment: management
  workflows:
    promise:
      configure:
      - apiVersion: platform.kratix.io/v1alpha1
        kind: Pipeline
        metadata:
          creationTimestamp: null
          name: dependencies
        spec:
          containers:
          - image: ghcr.io/jkroepke/idp/create-s3-bucket
            name: configure-deps
            command: ["/install-dependencies"]
          rbac: {}
    resource:
      configure:
      - apiVersion: platform.kratix.io/v1alpha1
        kind: Pipeline
        metadata:
          name: create-s3-bucket
        spec:
          containers:
          - image: ghcr.io/jkroepke/idp/create-s3-bucket:latest
            name: create-s3-bucket
status: {}
