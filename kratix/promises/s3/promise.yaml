apiVersion: platform.kratix.io/v1alpha1
kind: Promise
metadata:
  name: s3
  namespace: default
spec:
  destinationSelectors:
    - matchLabels:
        environment: management
  api:
    apiVersion: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    metadata:
      name: s3.kratix.jkroepke.de
    spec:
      group: kratix.jkroepke.de
      scope: Namespaced
      names:
        plural: s3s
        singular: s3
        kind: s3
      versions:
        - name: v1
          served: true
          storage: true
          schema:
            openAPIV3Schema:
              type: object
              properties:
                spec:
                  type: object
                  properties:
                    providerConfigRef:
                      type: object
                      properties:
                        kind:
                          type: string
                        name:
                          type: string
                      required:
                        - kind
                        - name
                  required:
                    - providerConfigRef
  workflows:
    resource:
      configure:
        - apiVersion: platform.kratix.io/v1alpha1
          kind: Pipeline
          metadata:
            name: create-s3-bucket
          rbac:
            containers:
              - name: create-s3-bucket
                # update the image if you are using a custom name
                image: ghcr.io/jkroepke/idp/create-s3-bucket:latest
